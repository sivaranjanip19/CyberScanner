<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberScanner Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<header>
    <h1>🛡 CyberScanner</h1>
    <nav>
        <a href="/">Home</a>
        <a href="/dashboard">Dashboard</a>
        <a href="/scan">Scan</a>
        <a href="/report">Reports</a>
    </nav>
</header>

<div class="container">

<h2>📊 Security Dashboard</h2>

<div class="cards">

<div class="card blue">
<h3>Total Scans</h3>
<h1>125</h1>
</div>

<div class="card red">
<h3>High Risk</h3>
<h1>4</h1>
</div>

<div class="card orange">
<h3>Medium Risk</h3>
<h1>12</h1>
</div>

<div class="card green">
<h3>Low Risk</h3>
<h1>109</h1>
</div>

</div>

<h2>Recent Scan Summary</h2>

<table>

<tr>
<th>Target IP</th>
<th>Risk</th>
<th>Status</th>
</tr>

{% for scan in history %}
<tr>
    <td>{{ scan.ip }}</td>
    <td>{{ scan.risk }}</td>
    <td>{{ scan.status }}</td>
</tr>
{% endfor %}


</table>

<br>

<a href="/scan">
<button>Start New Scan</button>
</a>

</div>

</body>
</html>
